server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # nginx is the edge today, so $remote_addr IS the client and we hand that to
    # the API (see the /api/ block). Once Caddy terminates TLS in front of us,
    # $remote_addr becomes Caddy's address and every caller collapses into one
    # rate-limit bucket -- so that change must ALSO add, scoped to the Caddy-only
    # edge subnet and nothing wider:
    #     set_real_ip_from <edge subnet>;
    #     real_ip_header X-Forwarded-For;
    # set_real_ip_from on its own does nothing; both directives or neither.

    # The script hash is the inline theme bootstrap in index.html. If that
    # script changes, we'll need to update this hash with it.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-IESmFgihSZWLmabjbaUN31PEJy2cxceVkNXcXEnK6R4='; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'none'; object-src 'none'" always;

    # Vite content-hashes everything under /assets, so a given URL never
    # changes meaning — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-IESmFgihSZWLmabjbaUN31PEJy2cxceVkNXcXEnK6R4='; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'none'; object-src 'none'" always;
        try_files $uri =404;
    }

    # SPA client-side routing: anything that isn't a real file falls back to the
    # app shell (so a hard refresh on /auth/google/callback etc. still resolves).
    # no-cache keeps the shell revalidated on every load; otherwise browsers
    # heuristically cache index.html and keep serving a pre-deploy bundle.
    location / {
        add_header Cache-Control "no-cache";
        # Location-level headers replace inherited add_header directives, so
        # keep the CSP here as well as at the server level.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-IESmFgihSZWLmabjbaUN31PEJy2cxceVkNXcXEnK6R4='; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'none'; object-src 'none'" always;
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API: forward /api/* to the FastAPI container. The path is passed
    # through unchanged, so /api/v1/health hits the API at /api/v1/health.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Overwrite, never append. uvicorn runs with --forwarded-allow-ips=*, which
        # makes it trust the LEFTMOST X-Forwarded-For entry -- so if we appended
        # ($proxy_add_x_forwarded_for), a caller could send its own X-Forwarded-For
        # and the per-IP rate limiter would happily bucket it under whatever IP it
        # claimed. $remote_addr is the one value we actually know.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
