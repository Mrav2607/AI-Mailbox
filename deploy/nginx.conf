server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: anything that isn't a real file falls back to the
    # app shell (so a hard refresh on /auth/google/callback etc. still resolves).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API: forward /api/* to the FastAPI container. The path is passed
    # through unchanged, so /api/v1/health hits the API at /api/v1/health.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
