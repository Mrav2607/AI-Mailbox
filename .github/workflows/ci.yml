name: CI

# Runs on PRs and feature-branch pushes, and is called by deploy.yml so a push to
# main gates the deploy on the exact same checks. The offline test suite stubs
# Postgres and Redis (see apps/api/tests/conftest.py), so no service containers.
on:
  pull_request:
  push:
    branches-ignore: [main] # main is covered by deploy.yml, which calls this workflow
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint · type · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      # Not blocking yet -- flip to a plain `mypy app` once the tree is clean.
      - name: Type-check (mypy)
        run: mypy app
        continue-on-error: true
      - name: Test (pytest)
        run: pytest -q

  web:
    name: Web (lint · type · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npx tsc -b
      - name: Test (vitest)
        run: npm test
      - name: Build (vite)
        run: npm run build

  images:
    name: Docker build sanity
    needs: [api, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build both images (no push) so a broken Dockerfile fails CI, not deploy.
      # Context is the repo root -- both Dockerfiles copy from apps/.
      - name: Build API image
        run: docker build -f deploy/Dockerfile.api -t ai-mailbox-api:ci .
      - name: Build Web image
        run: docker build -f deploy/Dockerfile.web -t ai-mailbox-web:ci .
